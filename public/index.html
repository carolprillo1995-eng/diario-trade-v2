<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>TradeVision — Diário do Trader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="app-loading" style="position:fixed;inset:0;background:#080d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;">
        <div style="font-family:'Segoe UI',Arial,sans-serif;text-align:center;">
          <div style="font-size:28px;font-weight:900;color:#e4e8f5;letter-spacing:-1px;">Trade<span style="color:#3b82f6;">Vision</span></div>
          <div style="color:#4a6fa5;font-size:13px;margin-top:6px;">Carregando...</div>
        </div>
        <div style="width:180px;height:3px;background:#1a2f50;border-radius:99px;overflow:hidden;">
          <div style="height:100%;background:linear-gradient(90deg,#3b5fe2,#5b8af5);border-radius:99px;animation:ldbar 1.4s ease-in-out infinite;"></div>
        </div>
        <style>@keyframes ldbar{0%{width:0%;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0%;margin-left:100%}}</style>
      </div>
    </div>
    <script>
      // Bloqueia seleção de texto
      document.addEventListener('selectstart', function(e) { e.preventDefault(); });
      // Bloqueia clique direito
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      // Bloqueia Ctrl+C, Ctrl+U, Ctrl+S, Ctrl+Shift+I, F12
      document.addEventListener('keydown', function(e) {
        if (
          (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's')) ||
          (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i') ||
          e.key === 'F12'
        ) {
          e.preventDefault();
        }
      });
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
