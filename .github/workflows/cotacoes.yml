name: Atualizar Cotacoes

on:
  schedule:
    - cron: '*/5 * * * *'    # a cada 5 minutos
  workflow_dispatch:           # botão manual no GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas requests websocket-client setuptools supabase

      - name: Rodar script
        run: python cotacoes/cotacoes_once.py
